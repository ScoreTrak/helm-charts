kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "envoy.fullname" . }}
data:
  envoy.yaml: |
    admin:
      access_log_path: /tmp/admin_access.log
      address:
        socket_address: { address: 127.0.0.1, port_value: 9901 }
    
    static_resources:
      listeners:
      - name: listener_0
        address:
          socket_address: { address: 0.0.0.0, port_value: {{ .Values.service.targetPort }} }
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              codec_type: auto
              stat_prefix: ingress_http
              route_config:
                name: routes
                virtual_hosts:
                - name: scoretrak_service
############################################### .Values.ScoreTrakDomain: (Make sure to not strip quotes ")
                  domains: ["{{ .Values.ScoreTrakDomain }}"]
                  routes:
                  - match:
                      prefix: "/"
                      headers:
                      - name: "Content-Type"
                        prefixMatch: "application/grpc-web-text"
                    route:
                      cluster: scoretrak-server
                      timeout: 0s
                      max_stream_duration:
                        grpc_timeout_header_max: 0s
                  - match:
                      prefix: "/"
                    route:
                      cluster: scoretrak-client
                  cors:
                    allow_origin_string_match:
                      - prefix: "*"
                    allow_methods: GET, PUT, DELETE, POST, OPTIONS
                    allow_headers: keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,custom-header-1,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout,authorization
                    max_age: "1728000"
                    expose_headers: custom-header-1,grpc-status,grpc-message
############################################### .Values.BankDomain: (Make sure to not strip quotes ")
                - name: bank_service
                  domains: ["{{ .Values.BankDomain}}"]
                  routes:
                  - match:
                      prefix: "/admin"
                    route:
                      cluster: commerce-backend
                  - match:
                      prefix: "/api"
                    route:
                      cluster: commerce-backend
                  - match:
                      prefix: "/static"
                    route:
                      cluster: commerce-backend
                  - match:
                      prefix: "/"
                    route:
                      cluster: commerce-ui
              http_filters:
                - name: envoy.filters.http.grpc_web
                - name: envoy.filters.http.cors
                - name: envoy.filters.http.router
      clusters:
        - name: scoretrak-server
          connect_timeout: 0.25s
          type: logical_dns
          http2_protocol_options: {}
          lb_policy: round_robin
          load_assignment:
            cluster_name: scoretrak-server
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "call-nested" ( list . "server" "server.fullname" ) }}
                          port_value: {{ .Values.server.service.grpc.externalPort }}

        - name: scoretrak-client
          connect_timeout: 0.25s
          type: logical_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: scoretrak-client
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "call-nested" ( list . "client" "client.fullname" ) }}
                          port_value: {{ .Values.client.service.port }}
    

#####################################################
          Optional based on "Bank Enabled Variable"?
#####################################################
        - name: commerce-ui
          connect_timeout: 0.25s
          type: logical_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: commerce-ui
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "call-nested" ( list . "client" "client.fullname" ) }} ### commerce-ui
                          port_value: {{ .Values.client.service.port }}  ###commerce-ui
        
        - name: commerce-backend
          connect_timeout: 0.25s
          type: logical_dns
          lb_policy: commerce-backend
          load_assignment:
            cluster_name: scoretrak-client
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "call-nested" ( list . "client" "client.fullname" ) }} #####commerce-backend
                          port_value: {{ .Values.client.service.port }} #####commerce-backend