apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "payments.fullname" . }}
  labels:
  {{- include "payments.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule }}
  jobTemplate:
    spec:
      template:
        metadata:
          {{- with .Values.podAnnotations }}
          annotations:
          {{- toYaml . | nindent 8 }}
          {{- end }}
          labels:
        {{- include "payments.selectorLabels" . | nindent 8 }}
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
          {{- toYaml . | nindent 8 }}
          {{- end }}
          serviceAccountName: {{ include "payments.serviceAccountName" . }}
          securityContext:
          {{- toYaml .Values.podSecurityContext | nindent 8 }}
          initContainers:
            - name: init-certs
              image: cockroachdb/cockroach-k8s-request-cert:0.4
              imagePullPolicy: IfNotPresent
              command:
                - "/bin/ash"
                - "-ecx"
                - "/request-cert -namespace=${POD_NAMESPACE} -certs-dir=/cockroach-certs -type=client -user=root -symlink-ca-from=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              volumeMounts:
                - name: client-certs
                  mountPath: /cockroach-certs
                - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
                  name: cockroach-cert-token
          containers:
            - name: {{ .Chart.Name }}
              securityContext:
              {{- toYaml .Values.securityContext | nindent 12 }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              ports:
                - name: http
                  containerPort: 80
                  protocol: TCP
              livenessProbe:
                httpGet:
                  path: /
                  port: http
              readinessProbe:
                httpGet:
                  path: /
                  port: http
              resources:
          {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
          {{- toYaml . | nindent 8 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
          {{- toYaml . | nindent 8 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
          {{- toYaml . | nindent 8 }}
      {{- end }}
